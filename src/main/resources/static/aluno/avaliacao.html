<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="../_favicon.ico">
  <title>Banca de avaliação - Orbe</title>
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a href="painel.html" class="btn btn-secondary">← Voltar ao painel</a>
    <button id="btnSair" class="btn btn-danger">Sair</button>
  </div>

  <h1 class="mb-4 text-center">Banca de avaliação</h1>

<div class="card shadow-sm p-4 mb-4">
    <div class="mb-3">

    <div class="mb-3">
      <label for="titulo" class="form-label"><strong>Título:</strong></label>
      <p class="border-bottom pb-2" id="titulo">—</p>
    </div>

    <div class="mb-3">
      <label for="orientador" class="form-label"><strong>Orientador:</strong></label>
      <p class="border-bottom pb-2" id="orientador">—</p>
    </div>

    <div class="mb-3">
      <label for="dataEHora" class="form-label"><strong>Data e hora:</strong></label>
      <p class="border-bottom pb-2" id="dataEHora">—</p>
    </div>

    <strong>Nota 1:</strong>
    <p id="textEmailAluno" class="border-bottom pb-2">—</p>
    </div>

    <div class="mb-3">
    <strong>Nota 2:</strong>
    <p id="textTelefoneAluno" class="border-bottom pb-2">—</p>
    </div>

    <div class="mb-3">
    <strong>Nota 3:</strong>
    <p id="textCurso" class="border-bottom pb-2">—</p>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <strong>Média parcial:</strong>
        <p id="textData" class="border-bottom pb-2">—</p>
      </div>
      <div class="col-md-6 mb-3">
        <strong>Situação:</strong>
        <p id="textStatus" class="border-bottom pb-2">—</p>
      </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/avaliacao.js"></script>
</body>
</html>
