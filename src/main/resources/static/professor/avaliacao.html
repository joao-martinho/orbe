<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="../_favicon.ico">
  <title>Banca de avaliação - Orbe</title>
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <a href="painel.html" class="btn btn-secondary">← Voltar ao painel</a>
    <button id="btnSair" class="btn btn-danger">Sair</button>
  </div>
  
  <h1 class="mb-4 text-center">Banca de avaliação</h1>

  <div id="mensagens" class="mb-3"></div>

  <form id="formNotas" class="card p-4 shadow-sm mb-5">
    <h5 class="mb-4">Aluno: </h5>

    <div class="mb-3">
      <label for="titulo" class="form-label"><strong>Título:</strong></label>
      <p class="border-bottom pb-2" id="titulo">—</p>
    </div>

    <div class="mb-3">
      <label for="orientador" class="form-label"><strong>Orientador:</strong></label>
      <p class="border-bottom pb-2" id="orientador">—</p>
    </div>

    <div class="mb-3">
      <label for="dataEHora" class="form-label"><strong>Data e hora:</strong></label>
      <p class="border-bottom pb-2" id="dataEHora">—</p>
    </div>

    <div class="mb-3">
      <label for="nota1" class="form-label">Nota 1</label>
      <input type="number" step="0.1" class="form-control" id="nota1">
    </div>

    <div class="mb-3">
      <label for="nota2" class="form-label">Nota 2</label>
      <input type="number" step="0.1" class="form-control" id="nota2">
    </div>

    <div class="mb-3">
      <label for="nota3" class="form-label">Nota 3</label>
      <input type="number" step="0.1" class="form-control" id="nota3">
    </div>

    <div class="mb-4">
      <button type="submit" class="btn btn-primary">Salvar</button>
    </div>

    <div class="row">
      <div id="mediaFinalContainer" class="col-md-6 mb-3">
        <strong>Média parcial:</strong>
        <p class="border-bottom pb-2" id="mediaFinal">—</p>
      </div>
      <div class="col-md-6 mb-3">
        <strong>Situação:</strong>
        <p id="textStatus" class="border-bottom pb-2">—</p>
      </div>
    </div>
    
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/avaliacao.js"></script>
</body>
</html>
